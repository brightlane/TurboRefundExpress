<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TurboRefund Express</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
  }

  /* FULL PAGE HERO CLICK AREA */
  .hero-link {
    display: block;
    text-decoration: none;
    color: inherit;
  }

  .hero {
    text-align: center;
    padding: 50px 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* LOGO FIX */
  .logo {
    width: min(450px, 92vw);
    height: auto;
    display: block;
    margin: 0 auto 25px auto;
  }

  .headline {
    font-size: 30px;
    font-weight: 800;
    margin: 10px 0 15px 0;
  }

  .subtext {
    font-size: 16px;
    line-height: 1.6;
    color: #444;
    max-width: 700px;
    margin: 0 auto;
  }

  .cta {
    margin-top: 25px;
    display: inline-block;
    padding: 15px 24px;
    background: #1a73e8;
    color: #fff;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.2s ease;
  }

  .cta:hover {
    background: #0f5bd1;
  }

  /* MOBILE OPTIMIZATION */
  @media (max-width: 600px) {
    .headline {
      font-size: 22px;
    }
  }
</style>
</head>

<body>

<!-- CHANGE THIS TO YOUR AFFILIATE URL -->
<a class="hero-link" href="https://YOUR-AFFILIATE-URL-HERE.com" target="_blank">

  <div class="hero">

    <!-- LOGO (MUST MATCH FILE NAME EXACTLY) -->
    <img
      class="logo"
      src="./turbo.jpg"
      alt="TurboRefund Express Logo"
      loading="lazy"
    >

    <div class="headline">
      What Taxpayers Should Know Before Choosing TurboTax
    </div>

    <div class="subtext">
      Filing costs can vary depending on income type, deductions, and additional forms.
      Comparing options before choosing a platform can help identify better value.
    </div>

    <div class="cta">
      Start Free Filing
    </div>

  </div>

</a>

</body>
</html>
