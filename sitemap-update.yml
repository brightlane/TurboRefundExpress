name: Update Sitemap

on:
  push:
    branches:
      - main  # Trigger the action on pushes to the 'main' branch

jobs:
  update-sitemap:
    runs-on: ubuntu-latest  # Run on the latest version of Ubuntu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install

      - name: Generate sitemap
        run: |
          node generate-sitemap.js  # This will run the script to generate the sitemap.xml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add sitemap.xml
          git commit -m "Update sitemap.xml"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
