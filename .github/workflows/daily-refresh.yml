name: Daily SEO Refresh

on:
  workflow_dispatch: # Allows manual run
  schedule:
    - cron: '0 0 * * *' # Runs daily

permissions:
  contents: write  # THIS IS THE CRITICAL MISSING PIECE

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4 to fix your deprecation warning
      - uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '20'

      - name: Generate Pages and Sitemap
        run: node generate.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated SEO Refresh" || echo "No changes to commit"
          git push
