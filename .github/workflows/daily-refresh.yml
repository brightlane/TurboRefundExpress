name: 20K Vulture Engine
on:
  schedule:
    - cron: '0 * * * *' # This triggers exactly at the start of every hour
  workflow_dispatch:      # Keeps the manual "Run" button active

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Engine
        run: node generate.js
      - name: Auto-Commit
        run: |
          git config --global user.name "SEO-Master-Bot"
          git config --global user.email "bot@brightlane.io"
          git add .
          git commit -m "Hourly 20k Deep Refresh: $(date)" || echo "No changes"
          git push
