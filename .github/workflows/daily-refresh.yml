name: TurboRefund SEO Auto-Refresh
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Matches your Hourly Deep Refresh strategy
  workflow_dispatch:

# FIX: This environment variable silences the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seo-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # FIX: Updated to v4.2.2 which supports the Node 24 runner
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1 

      # FIX: Updated to v4.1.0 which supports the Node 24 runner
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20' # Your code still runs on 20 to avoid breaking scripts
          cache: 'npm'

      - name: Ensure Folders Exist
        run: mkdir -p p

      - name: Install Dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run Turbo Engine
        run: |
          node generate.js
          node generate-sitemap.js

      - name: Commit and Push Large Update
        run: |
          git config --global user.name "SEO-Master-Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          TIMESTAMP=$(date -u)
          git commit -m "Hourly 20k Deep Refresh: $TIMESTAMP [Skip CI]" || exit 0
          git push
