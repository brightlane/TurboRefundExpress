name: TurboRefund SEO Auto-Refresh
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Runs every hour to match your "Hourly Refresh" strategy
  workflow_dispatch:

env:
  # Opt-in to Node 24 for the runner environment
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seo-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1 # Faster checkout for large repos

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20' # Keeping your app execution on Node 20
          cache: 'npm'

      - name: Ensure Folders Exist
        run: mkdir -p p # Based on your repo structure

      - name: Install Dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run Turbo Engine
        run: |
          node generate.js
          node generate-sitemap.js

      - name: Commit and Push Large Update
        run: |
          git config --global user.name "SEO-Master-Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Using a dynamic timestamp for your deep refresh logs
          TIMESTAMP=$(date -u)
          git commit -m "Hourly 20k Deep Refresh: $TIMESTAMP [Skip CI]" || exit 0
          git push
